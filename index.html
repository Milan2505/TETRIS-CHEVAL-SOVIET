  <div id="game-wrapper">

    <!-- Mobile Info Bar (visible on small screens only) -->
    <div class="mobile-info">
      <div class="mi-item">☭ ТЕТРИС</div>
      <div class="mi-item">Очки <span class="mi-val" id="m-score">0</span></div>
      <div class="mi-item">Линии <span class="mi-val" id="m-lines">0</span></div>
      <div class="mi-item">Ур. <span class="mi-val" id="m-level">1</span></div>
      <div class="mi-item">Лучш. <span class="mi-val" id="m-highscore">0</span></div>
    </div>

    <!-- Left Panel: Title, Score, Lines, Level, Music -->
    <div class="side-panel">
      <div class="header">
        <span class="sickle-hammer">☭</span>
        <div class="title">ТЕТРИС</div>
        <div class="subtitle">(TETRIS)</div>
      </div>
      <div class="panel-box">
        <div class="panel-title">Очки</div>
        <div class="panel-value" id="score">0</div>
      </div>
      <div class="panel-box">
        <div class="panel-title">Линии</div>
        <div class="panel-value" id="lines">0</div>
      </div>
      <div class="panel-box">
        <div class="panel-title">Уровень</div>
        <div class="panel-value" id="level">1</div>
        <div class="level-indicator" id="level-dots"></div>
      </div>
      <button id="music-btn">&#9835; МУЗЫКА: ON</button>
    </div>

    <!-- Center: Game Board -->
    <div id="game-container">
      <canvas id="tetris"></canvas>

      <!-- Start Overlay -->
      <div class="overlay" id="start-overlay">
        <h2>☭ ТЕТРИС ☭</h2>
        <p>СОВЕТСКАЯ КЛАССИКА</p>
        <button class="start-btn">ИГРАТЬ</button>
        <p class="start-note">НАЖМИТЕ ЧТОБЫ НАЧАТЬ</p>
      </div>

      <!-- Game Over Overlay -->
      <div class="overlay hidden" id="gameover-overlay">
        <h2>КОНЕЦ ИГРЫ</h2>
        <p>ФИНАЛЬНЫЙ СЧЁТ</p>
        <div class="score-display" id="final-score">0</div>
        <button class="start-btn">ЕЩЁ РАЗ</button>
      </div>
    </div>

    <!-- Right Panel: Next Piece, High Score, Controls -->
    <div class="right-panel">
      <div class="panel-box">
        <div class="panel-title">Следующ.</div>
        <canvas id="next-canvas" width="140" height="120"></canvas>
      </div>
      <div class="panel-box">
        <div class="panel-title">Лучший</div>
        <div class="panel-value" id="high-score">0</div>
      </div>
      <div class="panel-box">
        <div class="controls-info">
          <span>← →</span> Двигать<br>
          <span>↑</span> Вращать<br>
          <span>↓</span> Вниз<br>
          <span>SPACE</span> Бросить<br>
          <span>P</span> Пауза
        </div>
      </div>
      <div class="right-panel-footer">
        <span class="sickle-hammer">☭</span>
      </div>
    </div>

    <!-- Mobile Touch Controls (visible on small screens only) -->
    <div class="touch-controls">
      <button class="touch-btn" id="btn-left">◀</button>
      <button class="touch-btn" id="btn-rotate">↻</button>
      <button class="touch-btn" id="btn-down">▼</button>
      <button class="touch-btn" id="btn-drop">⏬</button>
      <button class="touch-btn" id="btn-right">▶</button>
    </div>
